version: '3.8'

services:
  app:
    build: .
    container_name: ai-infinitus-transcript
    ports:
      - "8501:8501"
    volumes:
      - ./temp:/app/temp  # Persiste arquivos temporários entre reinícios (opcional)
    env_file:
      - .env  # Carrega OPENAI_API_KEY e OPENAI_CONTENT_MODEL
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
